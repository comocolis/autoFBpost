<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>autoFBpost — Nouveau Départ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 p-8">
    <div class="max-w-md mx-auto bg-gray-900 p-6 rounded-2xl border border-gray-800">
        <h1 class="text-2xl font-bold mb-6">Configuration</h1>
        <input type="text" id="fbPageId" placeholder="FB Page ID" class="w-full bg-gray-800 p-3 rounded mb-2">
        <input type="text" id="fbPageToken" placeholder="FB Page Token" class="w-full bg-gray-800 p-3 rounded mb-4">
        
        <button onclick="testerAppel()" class="w-full bg-blue-600 p-3 rounded font-bold">Tester la connexion</button>
        <p id="status" class="mt-4 text-sm"></p>
    </div>

    <script>
        async function testerAppel() {
            const status = document.getElementById('status');
            status.innerText = "Test en cours...";
            
            try {
                // Appel direct vers l'URL de la fonction sans passer par le SDK Supabase
                const response = await fetch('https://wrtlnqifeynmjkbtonmy.supabase.co/functions/v1/publish-to-fb', {
                    method: 'OPTIONS', // On teste d'abord le preflight
                    mode: 'cors'
                });
                
                status.innerText = "Status de réponse CORS : " + response.status;
            } catch (e) {
                status.innerText = "Erreur fatale : " + e.message;
            }
        }
    </script>
</body>
</html>
