<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>autoFBpost — Interface Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-2xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">autoFBpost</h1>
            <p class="text-gray-400 mt-2">Générez et publiez vos posts automatiquement</p>
        </header>

        <!-- Configuration -->
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-xl mb-6">
            <h2 class="text-lg font-semibold mb-4 text-gray-200">Configuration</h2>
            <input type="text" id="fbPageId" placeholder="FB Page ID" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 mb-3">
            <input type="text" id="fbPageToken" placeholder="FB Page Token" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 mb-3">
            <input type="text" id="waNumber" placeholder="Numéro WhatsApp (ex: 33600000000)" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3">
        </div>

        <!-- Zone de travail -->
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-xl space-y-4">
            <label class="block text-sm font-medium">Choisir une catégorie</label>
            <select id="category" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="cosmetique">Cosmétiques Naturels</option>
                <option value="tech">Gadgets & Tech</option>
                <option value="maison">Décoration Maison</option>
                <option value="mode">Mode & Accessoires</option>
                <option value="fitness">Fitness & Bien-être</option>
            </select>
            
            <button id="genBtn" onclick="discover()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition shadow-lg">Générer 3 options</button>

            <div id="imageGrid" class="grid grid-cols-3 gap-2 hidden"></div>

            <textarea id="aiOutput" rows="6" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-4 font-mono text-sm" placeholder="Le résultat apparaîtra ici..."></textarea>
            
            <div id="actionContainer">
                <button id="publishBtn" onclick="publish()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition">Publier sur Facebook</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://wrtlnqifeynmjkbtonmy.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndydGxucWlmZXlubWprYnRvbm15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDI2MDMsImV4cCI6MjA5NzMxODYwM30.aeVGrIn6GO8-giGyvwFNTavolzOZhNgW8aFR3-inVvY'
        );
        
        let selectedImgUrl = "";

        async function discover() {
            const btn = document.getElementById('genBtn');
            const grid = document.getElementById('imageGrid');
            btn.disabled = true; btn.innerText = "Analyse en cours...";
            grid.innerHTML = ""; grid.classList.remove('hidden');
            
            try {
                const { data, error } = await supabaseClient.functions.invoke('discover-product', { 
                    body: { category: document.getElementById('category').value, wa: document.getElementById('waNumber').value || "0600000000" } 
                });
                if (error) throw error;
                
                document.getElementById('aiOutput').value = data.content;
                data.imageUrls.forEach(url => {
                    const img = document.createElement('img');
                    img.src = url;
                    img.className = "w-full aspect-square object-cover rounded-lg border-2 border-transparent cursor-pointer hover:border-blue-500 transition";
                    img.onclick = () => {
                        document.querySelectorAll('#imageGrid img').forEach(i => i.classList.replace('border-blue-500', 'border-transparent'));
                        img.classList.replace('border-transparent', 'border-blue-500');
                        selectedImgUrl = url;
                    };
                    grid.appendChild(img);
                });
            } catch (e) { alert("Erreur : " + e.message); } 
            finally { btn.disabled = false; btn.innerText = "Générer 3 options"; }
        }

        async function publish() {
            if(!selectedImgUrl) return alert("Sélectionnez une image d'abord.");
            
            const pageId = document.getElementById('fbPageId').value;
            const token = document.getElementById('fbPageToken').value;
            const message = document.getElementById('aiOutput').value;
            const wa = document.getElementById('waNumber').value;

            if(!pageId || !token) return alert("Veuillez remplir le Page ID et le Token.");

            const btn = document.getElementById('publishBtn');
            btn.disabled = true; btn.innerText = "Publication en cours...";

            try {
                const { data, error } = await supabaseClient.functions.invoke('publish-to-fb', {
                    body: { pageId, token, message, imageUrl: selectedImgUrl }
                });
                if (error) throw error;

                alert("Publié avec succès !");
                
                // Transformation du bouton en lien WhatsApp après succès
                const container = document.getElementById('actionContainer');
                container.innerHTML = `<a href="https://wa.me/${wa}" target="_blank" class="block text-center w-full bg-green-500 hover:bg-green-600 py-3 rounded-xl font-bold transition text-white">Contacter via WhatsApp</a>`;
                
            } catch (e) { 
                alert("Erreur de publication : " + e.message); 
                btn.disabled = false; btn.innerText = "Publier sur Facebook";
            }
        }
    </script>
</body>
</html>
