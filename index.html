<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>autoFBpost — Interface Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Configuration Tailwind pour le Dark Mode
  tailwind.config = { darkMode: 'class' };
  
  // Initialisation client sécurisée
  const supabaseClient = supabase.createClient(
    'https://wrtlnqifeynmjkbtonmy.supabase.co', 
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndydGxucWlmZXlubWprYnRvbm15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDI2MDMsImV4cCI6MjA5NzMxODYwM30.aeVGrIn6GO8-giGyvwFNTavolzOZhNgW8aFR3-inVvY'
  );
</script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-4 md:p-8">
  <div class="max-w-3xl mx-auto">
    <header class="mb-8 text-center">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">autoFBpost</h1>
      <p class="text-gray-400 mt-2">Générez et publiez vos posts automatiquement</p>
    </header>

    <div class="grid gap-6">
      <!-- Zone Générateur -->
      <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-xl">
        <label class="block text-sm font-medium mb-2">Choisir une catégorie</label>
        <select id="category" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 mb-4 focus:ring-2 focus:ring-blue-500 outline-none transition">
          <option value="cosmetique">Cosmétiques Naturels</option>
          <option value="tech">Gadgets & Tech</option>
          <option value="maison">Décoration Maison</option>
          <option value="mode">Mode & Accessoires</option>
          <option value="fitness">Fitness & Bien-être</option>
          <option value="cuisine">Cuisine & Ustensiles</option>
        </select>
        
        <button id="genBtn" onclick="discover()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition shadow-lg">
          Chercher un produit & Générer
        </button>

        <!-- Preview Image -->
        <div id="imageWrapper" class="hidden mt-6 overflow-hidden rounded-2xl border border-gray-800">
          <img id="productImg" src="" alt="Produit" class="w-full h-auto object-cover" onerror="this.parentElement.classList.add('hidden')" />
        </div>

        <textarea id="aiOutput" rows="6" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-4 mt-4 font-mono text-sm" placeholder="Le résultat apparaîtra ici..."></textarea>
        
        <button onclick="publish()" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-xl transition">
          Publier sur Facebook
        </button>
      </div>

      <!-- Zone Config -->
      <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-xl opacity-80">
        <h3 class="text-lg font-semibold mb-4">Configuration</h3>
        <input type="text" id="fbPageId" placeholder="FB Page ID" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 mb-2" />
        <input type="text" id="fbPageToken" placeholder="FB Page Token" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2 mb-2" />
      </div>
    </div>
  </div>

<script>
  async function discover() {
    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.innerText = "Recherche en cours...";
    document.getElementById('aiOutput').value = "Analyse en cours...";
    
    try {
      const { data, error } = await supabaseClient.functions.invoke('discover-product', { 
        body: { category: document.getElementById('category').value, wa: "0600000000" } 
      });
      
      if (error) throw error;
      
      document.getElementById('aiOutput').value = data.content;
      const img = document.getElementById('productImg');
      const wrapper = document.getElementById('imageWrapper');
      
      if(data.imageUrl) {
        img.src = data.imageUrl;
        wrapper.classList.remove('hidden');
      }
    } catch (e) {
      alert("Erreur : " + e.message);
    } finally {
      btn.disabled = false;
      btn.innerText = "Chercher un produit & Générer";
    }
  }

  async function publish() {
    const { data, error } = await supabaseClient.functions.invoke('publish-to-fb', { 
      body: { 
        pageId: document.getElementById('fbPageId').value, 
        token: document.getElementById('fbPageToken').value, 
        message: document.getElementById('aiOutput').value, 
        imageUrl: document.getElementById('productImg').src 
      } 
    });
    if (error) alert("Erreur : " + error.message); else alert("Publié avec succès !");
  }
</script>
</body>
</html>
